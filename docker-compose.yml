version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB:       agrikopru
      POSTGRES_USER:     agrikopru
      POSTGRES_PASSWORD: agrikopru_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrikopru"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
